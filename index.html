<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Núcleo Natura — Afferolab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ====================== TOKENS ====================== */
:root{
  --bg:#FAFAF7; --bg-soft:#F4F0E8; --surface:#FFFFFF; --line:#E8DFD2;
  --text:#2B1F17; --text-muted:#7A6754;
  --primary:#E85828; --primary-soft:#FAD8C8; --secondary:#B85838;
  --rosa:#E89DA8; --accent:#D4A574; --info:#8B7AB8;
  --success:#7A9B6E; --warn:#E5A23A; --danger:#C73E1E;
  --bioma-amazonia:#8B6F47; --bioma-caatinga:#C68B5C; --bioma-cerrado:#D4A574;
  --bioma-atlantica:#B85838; --bioma-mata:#A07254; --bioma-brasil:#E85828; --bioma-araucaria:#A88A5C;
  --shadow:0 1px 2px rgba(43,31,23,.04), 0 4px 16px rgba(43,31,23,.06);
  --shadow-lg:0 8px 40px rgba(43,31,23,.16);
  --radius:14px; --radius-sm:10px;
  --sidebar-w:240px; --sidebar-collapsed:64px;
}
[data-theme="dark"]{
  --bg:#1A1612; --bg-soft:#14110D; --surface:#211D18; --line:#2E2822;
  --text:#F5E8D8; --text-muted:#A89685;
  --primary:#FF6B3D; --primary-soft:#3A2418; --secondary:#D4744F;
  --rosa:#FFB0BD; --accent:#FFB870; --info:#A99BD6;
  --success:#8FB07F; --warn:#F0B85A; --danger:#FF5544;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}
/* scrollbars custom coral */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:linear-gradient(var(--primary),var(--secondary));border-radius:8px;border:2px solid var(--bg)}
*::-webkit-scrollbar-thumb:hover{background:var(--primary)}
*{scrollbar-color:var(--primary) transparent;scrollbar-width:thin}

/* ====================== LAYOUT ====================== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;
  transition:width .25s ease,transform .25s ease;
}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.content{margin-left:var(--sidebar-w);flex:1;transition:margin-left .25s ease;min-width:0}
.sidebar.collapsed ~ .content{margin-left:var(--sidebar-collapsed)}

/* sidebar header */
.sb-head{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line);min-height:64px}
.sb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;box-shadow:var(--shadow)}
.sb-logo img{width:100%;height:100%;object-fit:contain;border-radius:9px}
.sb-title{display:flex;flex-direction:column;overflow:hidden;white-space:nowrap}
.sb-title b{font-size:13.5px;font-weight:700}
.sb-title span{font-size:10.5px;color:var(--text-muted)}
.sidebar.collapsed .sb-title,.sidebar.collapsed .sb-section-label,.sidebar.collapsed .nav-txt,.sidebar.collapsed .mode-txt{display:none}

.sb-collapse{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;
  width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.sb-collapse:hover{background:var(--bg-soft);color:var(--text)}
.sidebar.collapsed .sb-collapse{margin:0 auto}

.sb-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:6px 12px}
.sb-section-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);
  padding:10px 8px 6px;font-weight:600}

/* mode switch — itens finos */
.mode-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;
  font-size:13px;color:var(--text-muted);border:1px solid transparent;transition:.15s;width:100%;background:none;text-align:left}
.mode-item .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.mode-item:hover{background:var(--bg-soft);color:var(--text)}
.mode-item.active{color:var(--primary);background:var(--primary-soft);font-weight:600}
.mode-item.active.interno{color:var(--info);background:color-mix(in srgb,var(--info) 14%,transparent)}

/* nav */
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;
  font-size:13.5px;color:var(--text-muted);transition:.15s;width:100%;background:none;border:none;text-align:left;position:relative}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.8}
.nav-item:hover{background:var(--bg-soft);color:var(--text)}
.nav-item.active{color:var(--primary);background:var(--primary-soft);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--primary)}
.sidebar.collapsed .nav-item{justify-content:center}

/* sidebar footer */
.sb-foot{border-top:1px solid var(--line);padding:8px}
.foot-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;
  font-size:13px;color:var(--text-muted);width:100%;background:none;border:none;text-align:left;transition:.15s}
.foot-item svg{width:17px;height:17px;flex-shrink:0;stroke-width:1.8}
.foot-item:hover{background:var(--bg-soft);color:var(--text)}
.sidebar.collapsed .foot-item span{display:none}
.sidebar.collapsed .foot-item{justify-content:center}

/* hamburger (mobile) */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:60;width:42px;height:42px;border-radius:11px;
  background:var(--surface);border:1px solid var(--line);cursor:pointer;place-items:center;box-shadow:var(--shadow)}
.hamburger svg{width:20px;height:20px;stroke:var(--text)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}

/* ====================== TOPBAR ====================== */
.view-head{padding:20px 28px 8px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.vh-titles{flex:1;min-width:200px}
.vh-titles h1{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
.vh-titles .sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--success);position:relative;cursor:help}
.live-dot::after{content:"";position:absolute;inset:-3px;border-radius:50%;background:var(--success);opacity:.35;animation:pulse 1.8s infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.35}70%{transform:scale(2.4);opacity:0}100%{opacity:0}}
.vh-actions{display:flex;align-items:center;gap:8px}

/* period pills */
.pills{display:inline-flex;background:var(--bg-soft);border-radius:10px;padding:3px;gap:2px}
.pill{padding:6px 13px;border-radius:8px;font-size:12.5px;color:var(--text-muted);cursor:pointer;border:none;background:none;font-weight:500;transition:.15s}
.pill.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow);font-weight:600}

/* kebab menu */
.kebab{position:relative}
.kebab-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--text-muted)}
.kebab-btn:hover{color:var(--text);border-color:var(--primary)}
.kebab-menu{position:absolute;right:0;top:40px;background:var(--surface);border:1px solid var(--line);border-radius:11px;
  box-shadow:var(--shadow-lg);padding:6px;min-width:170px;z-index:50;display:none}
.kebab-menu.open{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.kebab-menu button{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text);text-align:left}
.kebab-menu button:hover{background:var(--bg-soft)}
.kebab-menu button svg{width:15px;height:15px;color:var(--text-muted)}

/* ====================== FILTER BAR ====================== */
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 28px 4px}
.filter{display:flex;flex-direction:column;gap:3px}
.filter label{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);font-weight:600;padding-left:2px}
.filter select,.filter input{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12.5px;color:var(--text);font-family:inherit;min-width:120px;max-width:190px;cursor:pointer;text-overflow:ellipsis}
.filter input{cursor:text;min-width:150px;max-width:170px}
.filter select:focus,.filter input:focus{outline:none;border-color:var(--primary)}
.clear-link{font-size:12px;color:var(--primary);cursor:pointer;background:none;border:none;font-weight:600;align-self:flex-end;padding-bottom:8px}
.clear-link:hover{text-decoration:underline}

/* active filter chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 28px 0;min-height:0}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--primary-soft);color:var(--secondary);
  padding:4px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.chip b{font-weight:700}
.chip button{background:none;border:none;cursor:pointer;color:var(--secondary);display:grid;place-items:center;padding:0;font-size:14px;line-height:1}

/* ====================== GRID & CARDS ====================== */
.view-body{padding:14px 28px 90px}
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g-2-1{grid-template-columns:2fr 1fr}
.g-1-2{grid-template-columns:1fr 2fr}
.mt16{margin-top:16px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px}
.card-h h3{font-size:15px;font-weight:600}
.card-h .desc{font-size:12px;color:var(--text-muted);margin-top:1px;font-weight:400}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.expand-btn:hover{background:var(--bg-soft);color:var(--primary)}
.expand-btn svg{width:15px;height:15px}

/* KPI cards */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi .ic{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;opacity:.9}
.kpi .ic svg{width:16px;height:16px;color:#fff}
.kpi .label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);font-weight:600}
.kpi .val{font-size:28px;font-weight:700;font-family:'Fraunces',serif;margin-top:6px;letter-spacing:-.02em}
.kpi .val small{font-size:14px;color:var(--text-muted);font-family:'Inter';font-weight:500}
.kpi .delta{font-size:12px;font-weight:600;margin-top:3px;display:inline-flex;align-items:center;gap:3px}
.kpi .delta.up{color:var(--success)}.kpi .delta.down{color:var(--danger)}
.kpi .sub{font-size:11.5px;color:var(--text-muted);margin-top:4px}
.kpi.tint-coral{background:linear-gradient(135deg,var(--primary-soft),var(--surface))}
.kpi.tint-coral .ic{background:var(--primary)}
.kpi.tint-rosa{background:linear-gradient(135deg,color-mix(in srgb,var(--rosa) 30%,var(--surface)),var(--surface))}
.kpi.tint-rosa .ic{background:var(--rosa)}
.kpi.tint-gold{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 28%,var(--surface)),var(--surface))}
.kpi.tint-gold .ic{background:var(--accent)}
.kpi.tint-info{background:linear-gradient(135deg,color-mix(in srgb,var(--info) 20%,var(--surface)),var(--surface))}
.kpi.tint-info .ic{background:var(--info)}
.kpi-edit{position:absolute;bottom:10px;right:12px;font-size:10px;color:var(--text-muted);cursor:pointer;opacity:.6;background:none;border:none}
.kpi-edit:hover{opacity:1;color:var(--primary)}

.spark{height:28px;margin-top:8px}
.progress{height:6px;background:var(--bg-soft);border-radius:4px;margin-top:9px;overflow:hidden}
.progress span{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--secondary))}

.chart-box{height:280px;position:relative}
.chart-box.tall{height:320px}

/* ranking horizontal */
.rank{display:flex;flex-direction:column;gap:11px;margin-top:4px}
.rank-row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:10px;cursor:pointer}
.rank-row .nm{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar{height:22px;background:var(--bg-soft);border-radius:7px;overflow:hidden;position:relative}
.rank-bar span{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .7s cubic-bezier(.2,.8,.2,1)}
.rank-row .vl{font-size:13px;font-weight:700;min-width:26px;text-align:right;color:var(--secondary)}
.rank-row:hover .rank-bar span{filter:brightness(1.08)}

/* donut legend */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-wrap .chart-box{flex:0 0 180px;height:180px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.dl-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;background:var(--bg-soft)}
.dl-row .lft{display:flex;flex-direction:column}
.dl-row .lft b{font-size:13px}
.dl-row .lft span{font-size:11px;color:var(--text-muted)}
.dl-row .vl{font-size:18px;font-weight:700;font-family:'Fraunces'}

/* badges & alerts */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600}
.badge.coral{background:var(--primary-soft);color:var(--secondary)}
.badge.ok{background:color-mix(in srgb,var(--success) 18%,transparent);color:var(--success)}
.badge.warn{background:color-mix(in srgb,var(--warn) 20%,transparent);color:var(--warn)}

.alert{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:11px;background:var(--surface);
  border:1px solid var(--line);border-left:4px solid var(--warn);position:relative}
.alert.high{border-left-color:var(--danger)}
.alert.high::before{content:"";position:absolute;left:-4px;top:0;bottom:0;width:4px;background:var(--danger);border-radius:4px;animation:pulseBar 2s infinite}
@keyframes pulseBar{0%,100%{opacity:1}50%{opacity:.4}}
.alert.med{border-left-color:var(--warn)}
.alert.low{border-left-color:var(--accent)}
.alert .ico{font-size:16px;line-height:1.2}
.alert .tx{font-size:13px;flex:1}

/* ops health */
.ops-col h4{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ops-list{display:flex;flex-direction:column;gap:8px}
.ops-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:10px;background:var(--bg-soft)}
.ops-row .ot{font-size:12.5px}.ops-row .ot small{display:block;color:var(--text-muted);font-size:11px}
.ops-row .on{width:28px;height:28px;border-radius:8px;background:var(--primary-soft);color:var(--secondary);font-weight:700;font-size:13px;display:grid;place-items:center}

/* sub-tabs */
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);padding:0 28px;margin-top:6px}
.subtab{padding:10px 14px;font-size:13.5px;color:var(--text-muted);cursor:pointer;border:none;background:none;font-weight:500;position:relative}
.subtab.active{color:var(--primary);font-weight:600}
.subtab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2.5px;background:var(--primary);border-radius:2px}

/* table */
.tbl-wrap{overflow-x:auto;border-radius:11px;border:1px solid var(--line)}
table.agenda{width:100%;border-collapse:collapse;font-size:12.5px;min-width:880px}
table.agenda th{background:var(--bg-soft);text-align:left;padding:10px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:600;white-space:nowrap}
table.agenda td{padding:10px 12px;border-top:1px solid var(--line);white-space:nowrap}
table.agenda tr:hover td{background:var(--bg-soft)}
.t-id{font-weight:700;color:var(--secondary)}

/* timeline kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kan-col{background:var(--bg-soft);border-radius:12px;padding:0 0 10px;overflow:hidden}
.kan-head{background:linear-gradient(135deg,var(--secondary),var(--primary));color:#fff;padding:11px 13px}
.kan-head b{font-size:13px;display:block}.kan-head span{font-size:11px;opacity:.85}
.kan-head.feriado{background:linear-gradient(135deg,#6b6b6b,#999);text-decoration:line-through}
.kan-card.cancelada{opacity:.6;border-style:dashed;border-color:var(--danger)}
.kan-card.cancelada .kt{text-decoration:line-through;text-decoration-color:var(--danger)}
.kan-card{background:var(--surface);margin:9px;border-radius:10px;padding:10px 11px;box-shadow:var(--shadow);border:1px solid var(--line)}
.kan-card .kt{font-size:12px;font-weight:600;margin-bottom:5px}
.kan-card .kmeta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.kan-card .kf{font-size:10.5px;color:var(--text-muted)}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600}
.tag.live{background:color-mix(in srgb,var(--success) 16%,transparent);color:var(--success)}
.tag.pres{background:var(--primary-soft);color:var(--secondary)}
.tag.hora{background:var(--bg-soft);color:var(--text-muted)}

/* gantt */
.gantt{display:flex;flex-direction:column;gap:9px}
.gantt-row{display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:center}
.gantt-lbl{font-size:12px}.gantt-lbl small{display:block;color:var(--text-muted);font-size:10.5px}
.gantt-track{position:relative;height:26px;background:var(--bg-soft);border-radius:8px;overflow:hidden}
.gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:6px;background:linear-gradient(90deg,var(--secondary),var(--primary));
  display:flex;align-items:center;padding:0 8px;color:#fff;font-size:10.5px;font-weight:600;overflow:hidden}
.gantt-bar.cli{background:linear-gradient(90deg,var(--info),#a99bd6)}
.gantt-prog{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.25)}

/* org tree */
.org{display:flex;flex-direction:column;align-items:center;gap:0}
.org-level{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;position:relative;padding:18px 0}
.org-level:not(:last-child)::after{content:"";position:absolute;bottom:0;left:50%;width:2px;height:18px;background:var(--line)}
.org-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow);min-width:180px}
.org-card .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.org-card .oi b{font-size:13px;display:block}.org-card .oi span{font-size:11px;color:var(--text-muted)}.org-card .oi em{font-size:10.5px;color:var(--primary);font-style:normal}
.org-card.apoio{border-style:dashed;border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,var(--surface))}

/* voz da rede */
.voz-card{background:var(--bg-soft);border-radius:12px;padding:14px;border-left:3px solid var(--rosa)}
.voz-card .vt{font-size:13px;font-style:italic;line-height:1.5}
.voz-card .va{font-size:11px;color:var(--text-muted);margin-top:8px;font-weight:600}
.voz-card .stars{color:var(--accent);font-size:12px;margin-top:3px}
.wordcloud{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:6px}
.wordcloud span{font-weight:600;color:var(--secondary);line-height:1}

/* map */
.mapwrap{display:flex;gap:18px;align-items:flex-start}
.mapwrap svg{flex:0 0 300px;max-width:300px}
.map-region{cursor:pointer;transition:.2s;stroke:var(--surface);stroke-width:1.5}
.map-region:hover{filter:brightness(1.12)}
.map-tiles{flex:1;display:flex;flex-direction:column;gap:8px}
.tile{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:10px;background:var(--bg-soft);cursor:pointer}
.tile:hover{background:var(--primary-soft)}
.tile .tl{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:500}
.tile .sw{width:13px;height:13px;border-radius:4px}
.tile .tv{font-weight:700;font-family:'Fraunces';font-size:16px}

/* FAB lâmpada */
.fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;cursor:pointer;
  box-shadow:var(--shadow-lg);display:grid;place-items:center;z-index:55;transition:transform .2s}
.fab:hover{transform:scale(1.08) rotate(8deg)}
.fab svg{width:24px;height:24px;color:#fff}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none;place-items:center;padding:24px;backdrop-filter:blur(3px)}
.modal-bg.open{display:grid;animation:fadeIn .2s}
.modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);max-width:920px;width:100%;max-height:88vh;overflow:auto;padding:24px}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-h h3{font-family:'Fraunces';font-size:19px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:18px;color:var(--text-muted)}
.modal-close:hover{color:var(--danger);border-color:var(--danger)}

/* permission notice */
.perm-hidden{display:none!important}

/* responsive */
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g-2-1,.g-1-2{grid-template-columns:1fr}.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  .sidebar.mobile-open{transform:translateX(0)}
  .content{margin-left:0!important}
  .hamburger{display:grid}.sb-overlay.open{display:block}
  .view-head,.filters,.chips,.view-body,.subtabs{padding-left:16px;padding-right:16px}
  .g4,.g2{grid-template-columns:1fr}.kanban{grid-template-columns:1fr}
  .donut-wrap{flex-direction:column}.donut-wrap .chart-box{flex:none;width:100%}
  .mapwrap{flex-direction:column}.mapwrap svg{flex:none;width:100%;max-width:100%}
}
.hide{display:none!important}

/* === v2 additions === */
/* seta recolher invertendo */
.sb-collapse svg{transition:transform .25s}
.sb-collapse.flip svg{transform:rotate(180deg)}

/* botão atualizar dados */
.btn-refresh{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text);font-family:inherit}
.btn-refresh:hover{border-color:var(--primary);color:var(--primary)}
.btn-refresh svg{width:15px;height:15px}

/* mapa labels */
.map-label{font-size:8px;font-weight:700;fill:#fff;font-family:Inter;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.map-label-n{font-size:9px;font-weight:700;fill:#fff;font-family:Fraunces;pointer-events:none}

/* gantt v2 — cores legíveis + hoje + legenda */
.gantt{position:relative}
.gantt-row{cursor:pointer}
.gantt-row:hover .gantt-bar{filter:brightness(1.08)}
.gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:6px;display:flex;align-items:center;padding:0 8px;overflow:hidden}
.gantt-bar .gp{color:#fff;font-size:10.5px;font-weight:700;position:relative;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.gantt-bar.g-ahead{background:linear-gradient(90deg,#5a8c4a,var(--success))}
.gantt-bar.g-ok{background:linear-gradient(90deg,var(--secondary),var(--primary))}
.gantt-bar.g-tight{background:linear-gradient(90deg,#d98a2b,var(--warn))}
.gantt-bar.g-late{background:linear-gradient(90deg,#a02a14,var(--danger))}
.gantt-prog{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.35);z-index:1}
.gantt-today{position:absolute;top:0;bottom:26px;width:0;border-left:2px dashed var(--primary);z-index:5;pointer-events:none}
.gantt-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--text-muted)}
.gantt-legend span{display:inline-flex;align-items:center;gap:5px}
.gantt-legend i{width:13px;height:13px;border-radius:4px;display:inline-block}
.gantt-legend i.g-ahead{background:var(--success)}.gantt-legend i.g-ok{background:var(--primary)}
.gantt-legend i.g-tight{background:var(--warn)}.gantt-legend i.g-late{background:var(--danger)}
.gantt-legend i.dash{background:none;border-left:2px dashed var(--primary);border-radius:0;width:2px}

/* etapas modal */
.etapas{display:flex;flex-direction:column;gap:8px}
.etapa-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:11px;background:var(--bg-soft)}
.etapa-row .ei{font-size:18px}
.etapa-row .et{flex:1}.etapa-row .et b{font-size:13.5px;display:block}.etapa-row .et small{font-size:11px;color:var(--text-muted)}
.etapa-row.st-ok{background:color-mix(in srgb,var(--success) 12%,var(--bg-soft))}
.etapa-row.st-andamento{background:color-mix(in srgb,var(--warn) 12%,var(--bg-soft))}

/* vitrine equipe (cliente) */
.vitrine{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.vit-card{background:linear-gradient(135deg,var(--primary-soft),var(--surface));border:1px solid var(--line);border-radius:13px;padding:16px;text-align:center}
.vit-card b{font-size:13px;display:block;margin-bottom:6px}
.vit-card .vit-n{font-size:32px;font-weight:700;font-family:Fraunces;color:var(--primary);line-height:1}
.vit-card span{font-size:11px;color:var(--text-muted)}

/* matriz competências */
.md-table th.nv-esp{color:var(--success)}.md-table th.nv-inter{color:var(--warn)}.md-table th.nv-dev{color:var(--primary)}
.md-cat{font-weight:600;white-space:normal;min-width:160px;vertical-align:middle}
.md-cell{vertical-align:top;padding:8px!important}
.md-cell.nv-esp{background:color-mix(in srgb,var(--success) 9%,transparent)}
.md-cell.nv-inter{background:color-mix(in srgb,var(--warn) 9%,transparent)}
.md-cell.nv-dev{background:color-mix(in srgb,var(--primary) 9%,transparent)}
.fchip{display:inline-block;background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:3px 8px;font-size:10.5px;font-weight:600;margin:2px;cursor:pointer;white-space:nowrap}
.fchip:hover{border-color:var(--primary);color:var(--primary)}
.fchip.hl{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.md-search{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12.5px;color:var(--text);font-family:inherit;min-width:200px;margin-left:auto}
.md-search:focus{outline:none;border-color:var(--primary)}

/* raio-x modal */
.raiox{display:flex;flex-direction:column;gap:16px}
.rx-dim h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--secondary)}
.rx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:9px;background:var(--bg-soft);margin-bottom:6px;font-size:13px}

/* priorizações */
.prio{display:flex;flex-direction:column;gap:8px}
.prio-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;background:var(--bg-soft)}
.prio-row .prio-n{width:26px;height:26px;border-radius:8px;background:var(--primary);color:#fff;font-weight:700;font-size:13px;display:grid;place-items:center;flex-shrink:0}
.prio-row .ot{flex:1;font-size:12.5px}.prio-row .ot small{display:block;color:var(--text-muted);font-size:11px}

/* ===== LOGIN ===== */
#loginScreen{position:fixed;inset:0;z-index:100;display:flex;background:var(--bg)}
.login-art{flex:1;background:
  radial-gradient(circle at 30% 30%,rgba(232,88,40,.9),transparent 55%),
  radial-gradient(circle at 70% 70%,rgba(184,88,56,.85),transparent 55%),
  radial-gradient(circle at 50% 80%,rgba(232,157,168,.7),transparent 50%),
  linear-gradient(135deg,#E85828,#B85838);position:relative;overflow:hidden}
.login-art::after{content:"Núcleo Natura";position:absolute;bottom:40px;left:40px;color:rgba(255,255,255,.9);
  font-family:'Fraunces',serif;font-size:34px;font-weight:600;letter-spacing:-.01em;max-width:60%;line-height:1.1}
.login-art::before{content:"";position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;
  background:rgba(255,255,255,.08)}
.login-box{width:440px;max-width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:var(--surface)}
.login-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:28px;font-family:Fraunces;box-shadow:var(--shadow-lg);margin-bottom:18px}
.login-box h1{font-family:'Fraunces',serif;font-size:28px;font-weight:600}
.login-sub{font-size:13px;color:var(--text-muted);margin-top:2px;margin-bottom:28px}
.login-form{width:100%;max-width:300px;display:flex;flex-direction:column}
.login-form label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600;margin-bottom:5px;margin-top:14px}
.login-form input{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;color:var(--text);font-family:inherit}
.login-form input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.login-err{color:var(--danger);font-size:12.5px;min-height:18px;margin-top:8px;font-weight:500}
#loginBtn{margin-top:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;
  border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s}
#loginBtn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.login-foot{text-align:center;font-size:11px;color:var(--text-muted);margin-top:18px}
.login-forgot{background:none;border:none;color:var(--primary);font-size:12.5px;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit;text-align:center}
.login-forgot:hover{text-decoration:underline}
body.logged #loginScreen{display:none}
body:not(.logged) .app,body:not(.logged) .hamburger{display:none}
@media(max-width:768px){.login-art{display:none}.login-box{width:100%}}

/* === v3 components === */
.kpi-open{position:absolute;bottom:10px;right:12px;font-size:10px;color:var(--primary);opacity:.65;font-weight:600}
.kpi:hover .kpi-open{opacity:1}
.cap-box{background:var(--bg-soft);border-radius:12px;padding:16px;text-align:center}
.cap-box h4{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);font-weight:600}
.cap-box .cap-n{font-size:34px;font-weight:700;font-family:Fraunces;color:var(--primary);line-height:1.1;margin:4px 0}
.cap-box span{font-size:11.5px;color:var(--text-muted)}
.cap-bar{margin-top:10px;height:8px;border-radius:6px;background:var(--surface);overflow:hidden}
.cap-fill{height:100%;border-radius:6px;transition:width .7s}
.perfis{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.perfil-card{display:flex;align-items:center;gap:12px;padding:13px;border-radius:12px;background:var(--bg-soft);cursor:pointer;border:1px solid transparent;transition:.15s}
.perfil-card:hover{border-color:var(--primary);background:var(--surface)}
.pf-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.pf-info{flex:1;min-width:0}.pf-info b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pf-info span{font-size:11px;color:var(--text-muted)}
.carga{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.carga-card{display:flex;align-items:center;gap:11px;padding:13px;border-radius:12px;background:var(--bg-soft);cursor:pointer;border:1px solid transparent;transition:.15s}
.carga-card:hover{border-color:var(--primary);background:var(--surface)}
.cg-av{width:38px;height:38px;border-radius:10px;background:var(--info);color:#fff;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.cg-info{flex:1}.cg-info b{font-size:13px;display:block}.cg-info span{font-size:11px;color:var(--text-muted)}
input[type=date]{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12.5px;color:var(--text);font-family:inherit;cursor:pointer}
input[type=date]:focus{outline:none;border-color:var(--primary)}
.disp-cell{display:inline-block;width:18px;height:18px;border-radius:5px}
.disp-livre{background:var(--bg-soft);border:1px solid var(--line)}
.disp-1{background:var(--success)}
.disp-2{background:var(--accent)}
.disp-aus-p{background:repeating-linear-gradient(45deg,var(--warn),var(--warn) 3px,transparent 3px,transparent 6px);border:1px solid var(--warn)}
.disp-aus-i{background:var(--text-muted)}
.disp-conf{background:var(--danger);box-shadow:0 0 0 2px color-mix(in srgb,var(--danger) 30%,transparent)}
.disp-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:var(--text-muted)}
.disp-legend span{display:inline-flex;align-items:center;gap:5px}
.disp-legend i{width:14px;height:14px;border-radius:4px;display:inline-block}
.disp-legend i.disp-livre{background:var(--bg-soft);border:1px solid var(--line)}
.disp-legend i.disp-1{background:var(--success)}.disp-legend i.disp-2{background:var(--accent)}
.disp-legend i.disp-aus-p{background:repeating-linear-gradient(45deg,var(--warn),var(--warn) 3px,transparent 3px,transparent 6px)}
.voz-scroll{max-height:340px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-right:6px}
.voz-scroll::-webkit-scrollbar{width:7px}.voz-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.voz-cic{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit}
.map-region.map-active{stroke:var(--text);stroke-width:2.5;filter:brightness(1.1)}
.apl-scroll{max-height:380px;overflow-y:auto;padding-right:4px}
.prio-list{display:flex;flex-direction:column;gap:10px}
.prio-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:grab;transition:box-shadow .2s,transform .1s}
.prio-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.prio-card:active{cursor:grabbing}
.prio-rank{width:34px;height:34px;border-radius:9px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:Fraunces;font-size:16px;flex-shrink:0}
.prio-info{flex:1;min-width:0}.prio-info b{font-size:14px;display:block;color:var(--text)}
.prio-info small{font-size:11.5px;color:var(--text-muted)}
.prio-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.prio-tag.atrasado{background:rgba(232,88,40,.15);color:var(--primary)}
.prio-tag.urgente{background:rgba(232,88,40,.12);color:var(--primary)}
.prio-tag.medio{background:rgba(212,160,80,.18);color:var(--accent)}
.prio-tag.tranquilo{background:rgba(120,170,120,.18);color:var(--success)}
.prio-arrows{display:flex;flex-direction:column;gap:2px}
.prio-trava{border:1px solid var(--line);background:var(--bg-soft);border-radius:7px;width:32px;height:44px;cursor:pointer;font-size:14px;color:var(--text-muted);margin-right:6px}
.prio-trava:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.prio-card.prio-travado{opacity:.6;background:var(--bg-soft)}
.cap-pessoas{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.cap-pessoa{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;border:1px solid var(--line);cursor:pointer;transition:box-shadow .2s}
.cap-pessoa:hover{box-shadow:0 3px 12px rgba(0,0,0,.08)}
.cap-pessoa.cap-lotado{border-color:var(--primary);background:rgba(232,88,40,.06)}
.cap-pessoa.cap-limite{border-color:var(--accent);background:rgba(212,160,80,.06)}
.cap-av{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cap-det{flex:1;min-width:0}.cap-det b{font-size:13px;display:block}.cap-det span{font-size:11px;color:var(--text-muted)}
.cap-semaforo{font-size:10.5px;color:var(--text-muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
.cap-semaforo .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot.livre{background:var(--success)}.dot.limite{background:var(--accent)}.dot.lotado{background:var(--primary)}
.alert-bal{border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.4;border-left:3px solid}
.alert-bal.sobrecarga{background:rgba(232,88,40,.1);border-color:var(--primary)}
.prio-arrows button{border:1px solid var(--line);background:var(--bg-soft);border-radius:5px;width:26px;height:20px;cursor:pointer;font-size:10px;color:var(--text-muted);line-height:1}
.prio-arrows button:disabled{opacity:.3;cursor:default}
.prio-arrows button:hover:not(:disabled){background:var(--primary);color:#fff}
.apl-scroll::-webkit-scrollbar{width:7px}.apl-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.nps-bar{display:flex;height:36px;border-radius:10px;overflow:hidden;margin:6px 0 12px}
.nps-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;transition:width .7s}
.nps-leg{display:flex;gap:18px;flex-wrap:wrap;font-size:11.5px;color:var(--text-muted)}
.nps-leg span{display:inline-flex;align-items:center;gap:6px}
.nps-leg i{width:12px;height:12px;border-radius:3px;display:inline-block}
@media(max-width:700px){.voz-scroll{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ===================== CAPA DE LOGIN ===================== -->
<div id="loginScreen">
  <div class="login-art"></div>
  <div class="login-box">
    <div class="login-logo">N</div>
    <h1>Dashboard</h1>
    <div class="login-sub">Núcleo Natura · Afferolab</div>
    <div class="login-form">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="seu.nome@afferolab.com" autocomplete="email">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      <div class="login-err" id="loginErr"></div>
      <button id="loginBtn">Entrar</button>
      <button id="forgotBtn" type="button" class="login-forgot">Esqueci minha senha</button>
      <div class="login-foot">Acesso interno · Núcleo Natura</div>
    </div>
  </div>
</div>

<!-- hamburger mobile -->
<button class="hamburger" id="hamburger" aria-label="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="sb-overlay" id="sbOverlay"></div>

<div class="app">
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo" id="sbLogo"><span id="sbLogoTxt">N</span></div>
      <div class="sb-title">
        <b id="sbBrand">Dashboard</b>
        <span>Núcleo Natura</span>
      </div>
      <button class="sb-collapse" id="sbCollapse" title="Recolher">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <div class="sb-scroll">
      <div class="sb-section">
        <div class="sb-section-label">Modo</div>
        <button class="mode-item active" data-mode="cliente" id="modeCliente">
          <span class="dot"></span><span class="mode-txt">Visão Cliente</span>
        </button>
        <button class="mode-item interno" data-mode="interno" id="modeInterno">
          <span class="dot"></span><span class="mode-txt">Visão Interna</span>

<script>
/* =========================================================
   CAMADA DE DADOS — Google Sheets (CSV publicado)
   ---------------------------------------------------------
   COMO USAR:
   1) Google Sheets → Arquivo → Compartilhar → Publicar na web
      → escolha a ABA "Agenda" → formato CSV → copie o link.
   2) Cole em window.SHEETS.agenda abaixo.
   3) Botão "Atualizar dados" recarrega. Vazio = usa dados embutidos.
   ========================================================= */
window.SHEETS = {
  agenda: "",   // <-- CSV publicado da aba "Agenda"
  ausencias: "", // <-- CSV publicado da aba "Ausência" (opcional)
  cronograma: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2-_-doGnpgvp6htz1SuGvUASTtJM5Nsm5n6rHF87bWIR9IFJKPbuI4ByI3kSQLOPTzHCmUeu2f92o/pub?gid=1621477415&single=true&output=csv", // <-- CSV "Cronograma de Projeto" (detalhe DA/DG)
  entregas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2-_-doGnpgvp6htz1SuGvUASTtJM5Nsm5n6rHF87bWIR9IFJKPbuI4ByI3kSQLOPTzHCmUeu2f92o/pub?gid=874084173&single=true&output=csv",   // <-- CSV "Entregas Finalizadas / Projetos Entregues"
  colmap: { t:"Controle de turma", eq:"Ponto Focal", d:"Data", h:"Horário início",
    tr:"Treinamento", sub:"Subtema", st:"Status", cic:"Ciclo", f:"Facilitador",
    m:"Moderador", mod:"Modalidade", pub:"Público", gv:"Nome GV", set:"Nome Setor",
    mkt:"Mercado", p:"Nº estimado de participantes", pr:"Nº real de participantes",
    desl:"Impacto de Deslocamento - Viagem?", ch:"Carga horária" },
  // mapeamento da aba "Ausência" (mesma planilha de Agenda)
  colmapAus: { nome:"Nome", ini:"Data Início da ausência", fim:"Data Fim da ausência",
    hini:"Horário início da ausência", hfim:"Horário término da ausência",
    tipo:"Tipo", det:"Detalhes" },
  // mapeamento "Cronograma de Projeto": linha com Ordem preenchida = cabeçalho do
  // projeto; linhas seguintes (Ordem vazia) = etapas até o próximo cabeçalho.
  colmapCrono: { ordem:"Ordem", proj:"PROJETO", tarefa:"TAREFA", perfil:"PERFIL",
    resp:"ATRIBUÍDO PARA", ini:"DATA INÍCIO REAL", fim:"DATA FIM REAL",
    periodo:"PERÍODO", status:"STATUS PRODUÇÃO" },
  // mapeamento "Entregas Finalizadas"
  colmapEnt: { nome:"PROJETO", resp:"ATRIBUÍDO PARA", mes:"MÊS DA ENTREGA",
    fmt:"FORMATO SAÍDA", respCliente:"CLIENTE", fim:"DATA FIM REAL" }
};
function parseCSV(txt){
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<txt.length;i++){const c=txt[i];
    if(q){if(c==='"'){if(txt[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(c==='\r'){}else cell+=c;}}
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(x=>x&&x.trim())).map(r=>Object.fromEntries(head.map((h,i)=>[h,(r[i]||'').trim()])));
}
function xlDate(v){if(!v)return '';
  if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(v)){
    let[a,b,y]=v.split('/').map(x=>parseInt(x,10));
    // detecta formato: se a>12 é dia (BR dd/mm); se b>12 é dia (US mm/dd); senão assume US (planilha está em mm/dd/yyyy)
    let d,m;
    if(a>12){d=a;m=b;}        // BR: dd/mm/yyyy
    else if(b>12){m=a;d=b;}   // US: mm/dd/yyyy
    else{m=a;d=b;}            // ambíguo -> US (formato desta planilha)
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  const n=parseFloat(v);if(!isNaN(n)&&n>40000&&n<60000){const dt=new Date(Date.UTC(1899,11,30)+n*864e5);return dt.toISOString().slice(0,10);}
  return '';}
function cicFmt(v){const s=(v||'').replace(/\.0$/,'').replace(/\D/g,'');return s.length>=6?'C'+s.slice(-2):'';}
// transforma linhas CSV -> formato window.AGENDA e substitui
function applyRows(rows){
  const C=window.SHEETS.colmap;const g=(r,k)=>(r[C[k]]!==undefined?r[C[k]]:'').toString().replace(/\u00a0/g,'').trim();
  const num=v=>{const n=parseInt((v||'').replace(/\u00a0/g,''));return isNaN(n)?null:n;};
  const out=rows.filter(r=>g(r,'t')).map(r=>({
    t:g(r,'t').replace(/ /g,''),eq:g(r,'eq'),d:xlDate(g(r,'d')),h:g(r,'h')||null,
    tr:g(r,'tr'),sub:g(r,'sub'),st:g(r,'st'),cic:cicFmt(g(r,'cic')),
    f:g(r,'f')||'Sem informação',m:g(r,'m')||'N/A',mod:g(r,'mod'),pub:g(r,'pub'),
    gv:g(r,'gv').replace(/^GV /,'').replace(/^0$/,''),set:g(r,'set').replace(/^0$/,''),
    mkt:g(r,'mkt').replace(/^0$/,''),p:num(g(r,'p')),pr:num(g(r,'pr')),desl:g(r,'desl')
  }));
  if(out.length){window.AGENDA.length=0;out.forEach(x=>window.AGENDA.push(x));}
  return out.length;
}

// ===== status de etapa: planilha -> ok / andamento / pendente =====
function stEtapa(v){
  const s=(v||'').toString().toLowerCase();
  if(/conclu|finaliz|entregue|ok|feito|pronto/.test(s)) return 'ok';
  if(/andamento|produç|produc|em curso|fazendo|iniciad/.test(s)) return 'andamento';
  return 'pendente';
}
// CSV -> matriz de linhas cruas (sem assumir cabeçalho na 1ª linha)
function parseCSVMatrix(txt){
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<txt.length;i++){const c=txt[i];
    if(q){if(c==='"'){if(txt[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(c==='\r'){}else cell+=c;}}
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  return rows;
}
// acha a linha de cabeçalho real (que contém todos os termos dados) e devolve {idx, cols}
function acharCabecalho(matrix, termos){
  for(let i=0;i<Math.min(matrix.length,30);i++){
    const linha=matrix[i].map(c=>(c||'').replace(/\s+/g,' ').trim().toUpperCase());
    if(termos.every(t=>linha.includes(t.toUpperCase()))) return {idx:i, cols:matrix[i].map(c=>(c||'').trim())};
  }
  return null;
}
// ===== Cronograma de Projeto (detalhe) -> formato window.PROJETOS =====
// Estrutura real: cabeçalho na ~linha 7. Linha com PROJETO preenchido e TAREFA
// vazia = início de projeto (nome legível). Linhas seguintes com TAREFA
// preenchida = etapas. prog/done/total/etapaAtual calculados aqui.
function applyCronograma(csvText){
  const matrix=parseCSVMatrix(csvText);
  const hdr=acharCabecalho(matrix,['PROJETO','TAREFA','PERFIL']);
  if(!hdr) throw new Error('cabeçalho PROJETO/TAREFA não encontrado');
  const cols=hdr.cols.map(c=>c.replace(/\s+/g,' ').trim());
  const idx=n=>cols.findIndex(c=>c.toUpperCase()===n.toUpperCase());
  const iProj=idx('PROJETO'), iTar=idx('TAREFA'), iPerf=idx('PERFIL'),
        iResp=idx('ATRIBUÍDO PARA'), iIni=idx('DATA INÍCIO REAL'),
        iFim=idx('DATA FIM REAL'), iSt=idx('STATUS PRODUÇÃO');
  const cel=(r,i)=>(i>=0&&r[i]!==undefined?r[i]:'').toString().replace(/\u00a0/g,'').trim();
  const projs=[]; let cur=null;
  for(let i=hdr.idx+1;i<matrix.length;i++){
    const r=matrix[i];
    const proj=cel(r,iProj), tarefa=cel(r,iTar);
    if(!proj&&!tarefa) continue;            // linha vazia
    if(proj&&!tarefa){                       // cabeçalho de projeto (nome legível)
      cur={ nome:proj, etapas:[] }; projs.push(cur); continue;
    }
    if(!cur) continue;                       // etapa antes de qualquer projeto
    if(!tarefa) continue;                    // sem tarefa, ignora
    cur.etapas.push({
      t:tarefa, perfil:cel(r,iPerf).toUpperCase(), resp:cel(r,iResp),
      ini:xlDate(cel(r,iIni)), fim:xlDate(cel(r,iFim)), st:stEtapa(cel(r,iSt))
    });
  }
  const out=projs.filter(p=>p.etapas.length).map(p=>{
    const total=p.etapas.length;
    const done=p.etapas.filter(e=>e.st==='ok').length;
    const prog=total?Math.round(done/total*100):0;
    const datas=p.etapas.map(e=>e.ini).filter(Boolean).sort();
    const fins=p.etapas.map(e=>e.fim).filter(Boolean).sort();
    const emAnd=p.etapas.find(e=>e.st==='andamento');
    const prox =p.etapas.find(e=>e.st==='pendente');
    const resps=[...new Set(p.etapas.map(e=>e.resp).filter(r=>r&&!/natura|avon/i.test(r)))].slice(0,3);
    return {
      nome:p.nome, status:prog>=100?'Concluído':prog>0?'Em produção':'A iniciar',
      resp:resps.join(', '), ini:datas[0]||'', fim:fins[fins.length-1]||'',
      entregaFinal:fins[fins.length-1]||'', prog, done, total,
      etapaAtual:(emAnd&&emAnd.t)||(prox&&prox.t)||'', etapas:p.etapas
    };
  });
  if(out.length){window.PROJETOS.length=0;out.forEach(x=>window.PROJETOS.push(x));}
  return out.length;
}
// ===== Entregas Finalizadas -> formato window.ENTREGAS =====
// Mesma estrutura: cabeçalho com PROJETO/TAREFA; projeto = TAREFA vazia,
// mas aqui interessa o nível de PROJETO entregue (linha-cabeçalho com MÊS DA ENTREGA).
function applyEntregas(csvText){
  const matrix=parseCSVMatrix(csvText);
  const hdr=acharCabecalho(matrix,['PROJETO','MÊS DA ENTREGA']);
  if(!hdr) throw new Error('cabeçalho PROJETO/MÊS DA ENTREGA não encontrado');
  const cols=hdr.cols.map(c=>c.replace(/\s+/g,' ').trim());
  const idx=n=>cols.findIndex(c=>c.toUpperCase()===n.toUpperCase());
  const iProj=idx('PROJETO'), iTar=idx('TAREFA'), iResp=idx('ATRIBUÍDO PARA'),
        iMes=idx('MÊS DA ENTREGA'), iFmt=idx('FORMATO SAÍDA'),
        iCli=idx('CLIENTE'), iFim=idx('DATA FIM REAL');
  const cel=(r,i)=>(i>=0&&r[i]!==undefined?r[i]:'').toString().replace(/\u00a0/g,'').trim();
  const out=[];
  for(let i=hdr.idx+1;i<matrix.length;i++){
    const r=matrix[i];
    const proj=cel(r,iProj), tarefa=cel(r,iTar), mes=cel(r,iMes);
    // linha-cabeçalho de projeto entregue = PROJETO preenchido, TAREFA vazia
    if(proj&&!tarefa){
      out.push({
        nome:proj, resp:cel(r,iResp)||'—', mes:mes,
        fmt:cel(r,iFmt), respCliente:cel(r,iCli)||'—', fim:xlDate(cel(r,iFim))
      });
    }
  }
  if(out.length){window.ENTREGAS.length=0;out.forEach(x=>window.ENTREGAS.push(x));}
  return out.length;
}
async function loadData(showMsg){
  const S=window.SHEETS||{};
  const algumaFonte=S.agenda||S.cronograma||S.entregas;
  if(!algumaFonte){if(showMsg)toast('Usando dados embutidos (planilha não configurada).');return false;}
  const fetchCSV=async u=>parseCSV(await (await fetch(u)).text());
  const fetchText=async u=>{const r=await fetch(u); if(!r.ok)throw new Error('HTTP '+r.status); return await r.text();};
  let nTurmas=0, okAlgum=false, falhas=[];
  toast('Atualizando da planilha…');
  // 1) Agenda (turmas)
  if(S.agenda){
    try{nTurmas=applyRows(await fetchCSV(S.agenda)); if(nTurmas)okAlgum=true; else falhas.push('Agenda(0 linhas)');}
    catch(e){falhas.push('Agenda:'+e.message);}
  }
  // 2) Ausências (opcional, mesma planilha de Agenda)
  if(S.ausencias){
    try{applyAusencias(await fetchCSV(S.ausencias)); okAlgum=true;}catch(e){falhas.push('Ausências:'+e.message);}
  }
  // 3) Cronograma de Projeto (detalhe -> window.PROJETOS, resumo derivado)
  if(S.cronograma){
    try{const n=applyCronograma(await fetchText(S.cronograma)); if(n)okAlgum=true; else falhas.push('Cronograma(0 projetos)');}
    catch(e){falhas.push('Cronograma:'+e.message);}
  }
  // 4) Entregas Finalizadas
  if(S.entregas){
    try{const n=applyEntregas(await fetchText(S.entregas)); if(n)okAlgum=true; else falhas.push('Entregas(0 linhas)');}
    catch(e){falhas.push('Entregas:'+e.message);}
  }
  try{refreshView();}catch(e){console.error('refreshView',e);}
  if(okAlgum){
    toast('Atualizado ✓'+(nTurmas?(' '+nTurmas+' turmas'):'')+(falhas.length?(' · falhou: '+falhas.join(', ')):''));
    return true;
  }else{
    toast('Falha: '+(falhas.join(' | ')||'nada carregado'));
    return false;
  }
}
// Re-render preservando a aba atual e a posição de scroll.
// O render() reconstrói os gráficos (destroy/recreate), então não dá pra evitar
// o redesenho — mas preservar o scroll elimina o efeito de "sair da página".
function refreshView(){
  const y=window.scrollY||document.documentElement.scrollTop||0;
  render();
  // restaura o scroll por alguns frames, pois a altura muda enquanto os gráficos montam
  let tentativas=0;
  const restaura=()=>{window.scrollTo(0,y); if(++tentativas<8)requestAnimationFrame(restaura);};
  requestAnimationFrame(restaura);
}
function applyAusencias(rows){
  const C=window.SHEETS.colmapAus;const g=(r,k)=>(r[C[k]]!==undefined?r[C[k]]:'').toString().replace(/\u00a0/g,'').trim();
  const hh=v=>{const m=(v||'').match(/(\d{1,2}):(\d{2})/);return m?(m[1].padStart(2,'0')+':'+m[2]):'';};
  const out=rows.filter(r=>g(r,'nome')).map(r=>{
    const hini=hh(g(r,'hini')),hfim=hh(g(r,'hfim'));
    const per=(!hini||(hini<='09:00'&&hfim>='18:00'))?'Integral':'Parcial';
    return {nome:g(r,'nome').toUpperCase(),ini:xlDate(g(r,'ini')),fim:xlDate(g(r,'fim')),
      hini,hfim,tipo:g(r,'tipo'),det:g(r,'det'),per};
  });
  if(out.length){window.AUSENCIAS.length=0;out.forEach(x=>window.AUSENCIAS.push(x));}
  return out.length;
}
function toast(msg){let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;z-index:90;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .25s';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',2600);}
</script>

<script>
/* =========================================================
   AGREGAÇÃO — calcula tudo a partir de window.AGENDA filtrada
   É isto que faz os filtros moverem TODOS os gráficos.
   ========================================================= */
const AG = window.AGENDA;

// aplica os filtros ativos do estado à agenda
function filteredAgenda(){
  let a=AG;
  // período (pílulas): trimestre=3 meses até hoje, mês=mês atual, ciclo=ciclo atual
  const hoje=new Date(D.META.hoje+'T00:00');
  if(state.period==='ano'){
    a=a.filter(x=>x.d&&x.d.slice(0,4)==='2026');
  } else if(state.period==='mes'){
    const m=D.META.hoje.slice(0,7); a=a.filter(x=>x.d&&x.d.slice(0,7)===m);
  } else if(state.period==='tri'){
    const ini=new Date(hoje); ini.setMonth(hoje.getMonth()-2); ini.setDate(1);
    const iniS=ini.toISOString().slice(0,10);
    a=a.filter(x=>x.d&&x.d>=iniS&&x.d<=D.META.hoje.slice(0,7)+'-31');
  } else if(state.period==='ciclo'){
    a=a.filter(x=>x.cic===D.META.cicloAtual);
  }
  const f=state.filters;
  if(f['Ciclo']) a=a.filter(x=>x.cic===f['Ciclo']);
  if(f['Status']) a=a.filter(x=>x.st===f['Status']);
  if(f['Modalidade']) a=a.filter(x=>x.mod===f['Modalidade']);
  if(f['Tipo de Entrada']) a=a.filter(x=>x.tipoE===f['Tipo de Entrada']);
  if(f['Treinamento']) a=a.filter(x=>x.tr===f['Treinamento']);
  if(f['GV']) a=a.filter(x=>x.gv===f['GV']);
  if(f['Setor']) a=a.filter(x=>x.set===f['Setor']);
  if(f['Ponto Focal']) a=a.filter(x=>x.eq===f['Ponto Focal']);
  if(f['Público']) a=a.filter(x=>x.pub===f['Público']);
  // recorte por intervalo de datas (global)
  if(f['DataIni']) a=a.filter(x=>x.d&&x.d>=f['DataIni']);
  if(f['DataFim']) a=a.filter(x=>x.d&&x.d<=f['DataFim']);
  if(f['Bioma']) a=a.filter(x=>(D.STATIC.biomaId[x.mkt]||'brasil')===f['Bioma']);
  if(f['Facilitador']) a=a.filter(x=>x.f===f['Facilitador']);
  if(f['Moderador']) a=a.filter(x=>x.m===f['Moderador']);
  if(f['chegou']) a=a.filter(x=>x.chegou===f['chegou']);
  return a;
}
// contagem genérica → [{nome,turmas}]
function tally(arr,keyFn,n=999){
  const m={};arr.forEach(x=>{const k=keyFn(x);if(k&&k!=='Afferolab e Natura')m[k]=(m[k]||0)+1;});
  return Object.entries(m).map(([nome,turmas])=>({nome,turmas})).sort((a,b)=>b.turmas-a.turmas).slice(0,n);
}
// agregações nomeadas (usadas pelas views)
const A = {
  base:()=>filteredAgenda(),
  total:a=>a.length,
  byStatus:a=>{const m={};a.forEach(x=>m[x.st]=(m[x.st]||0)+1);return m;},
  ciclos:a=>tally(a,x=>x.cic).sort((x,y)=>x.nome.localeCompare(y.nome)),
  biomas:a=>{
    const m={};a.forEach(x=>{const id=D.STATIC.biomaId[x.mkt]||(x.mkt?'brasil':null);if(id){const nm=x.mkt;m[id]=m[id]||{id,nome:nm,turmas:0};m[id].turmas++;}});
    return Object.values(m).sort((p,q)=>q.turmas-p.turmas);
  },
  topGV:(a,n=8)=>tally(a,x=>x.gv,n),
  topTrein:(a,n=6)=>tally(a,x=>x.tr,n),
  topFacil:(a,n=10)=>tally(a,x=>x.f==='Sem informação'?null:x.f,n),
  topModer:(a,n=8)=>tally(a,x=>x.m==='N/A'?null:x.m,n),
  publico:a=>tally(a,x=>x.pub),
  modalidade:a=>tally(a,x=>x.mod),
  // participantes (real, senão estimado) por ciclo → pra "ciclo com mais pessoas"
  pessoasPorCiclo:a=>{const m={};a.forEach(x=>{const p=x.pr!=null?x.pr:(x.p||0);if(x.cic)m[x.cic]=(m[x.cic]||0)+p;});
    return Object.entries(m).map(([ciclo,pessoas])=>({ciclo,pessoas})).sort((x,y)=>y.pessoas-x.pessoas);},
  pessoasTotal:a=>a.reduce((s,x)=>s+(x.pr!=null?x.pr:(x.p||0)),0),
  // valores únicos pra montar filtros
  opts:(key)=>['Todos',...[...new Set(AG.map(x=>x[key]).filter(v=>v&&v!=='Afferolab e Natura'))].sort()]
};

// semana de referência (a partir de hoje META.hoje, +6 dias)
function semanaDias(){
  const base=new Date(D.META.hoje+'T00:00');
  return [...Array(7)].map((_,i)=>{const dt=new Date(base);dt.setDate(base.getDate()+i);
    return dt.toISOString().slice(0,10);});
}
</script>

<script>
/* RENDER v3 — componentes + views CLIENTE (tudo dinâmico via A) */
function kpi({tint,icon,label,val,sub,delta,deltaDir,spark,progress,open}){
  return `<div class="kpi tint-${tint}" ${open?`onclick="${open}" style="cursor:pointer"`:''}>
    <div class="ic">${ICONS[icon]||icon}</div>
    <div class="label">${label}</div><div class="val">${val}</div>
    ${delta?`<div class="delta ${deltaDir||'up'}">▲ ${delta}</div>`:''}
    ${sub?`<div class="sub">${sub}</div>`:''}
    ${spark?`<div class="spark"><canvas id="${spark}"></canvas></div>`:''}
    ${progress!=null?`<div class="progress"><span style="width:${progress}%"></span></div>`:''}
    ${open?`<div class="kpi-open">abrir ↗</div>`:''}
  </div>`;
}
function card(title,desc,inner,expandId){
  return `<div class="card">
    <div class="card-h"><div><h3>${title}</h3>${desc?`<div class="desc">${desc}</div>`:''}</div>
    ${expandId?`<button class="expand-btn" onclick="expandChart('${expandId}','${title.replace(/'/g,'')}')" title="Ampliar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>`:''}
    </div>${inner}</div>`;
}
function rankList(data,dim,clickable=true,showPct=false){
  if(!data.length)return '<div style="color:var(--text-muted);font-size:13px;padding:14px">Sem dados no recorte.</div>';
  const max=Math.max(...data.map(d=>d.turmas));
  const total=data.reduce((s,d)=>s+d.turmas,0);
  return `<div class="rank">`+data.map(d=>`
    <div class="rank-row" ${clickable&&dim?`onclick="crossFilter('${dim}','${d.nome.replace(/'/g,'')}')" title="Filtrar"`:''}>
      <div class="nm" title="${d.nome}">${d.nome}</div>
      <div class="rank-bar"><span style="width:${d.turmas/max*100}%"></span></div>
      <div class="vl">${d.turmas}${showPct&&total?` <small style="color:var(--text-muted);font-weight:500">(${Math.round(d.turmas/total*100)}%)</small>`:''}</div></div>`).join('')+`</div>`;
}
const biomaColor=id=>cssVar('--bioma-'+id);
const fmtBR=s=>{if(!s)return '';const[y,m,d]=s.split('-');return `${d}/${m}`;};
const fmtBRfull=s=>{if(!s)return '';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;};

// ===== ROTEADORES VISÃO CLIENTE (3 abas) =====
function viewVisaoGeralCli(){

  $('#viewBody').innerHTML=facResultadosCli()+`<div class="mt16">${cardMt('Linha do tempo da semana','Agenda da semana · reativa aos filtros',kanbanBlock(true))}</div>`;
  facResultadosDraw();
}
function viewFacilitacaoCli(){
  if(state.subtab===0){ $('#viewBody').innerHTML=facResultadosAgenda(); drawFacResultados(); return; }
  if(state.subtab===1) return (function(){$('#viewBody').innerHTML=facEquipeCli();})();

  if(state.subtab===3){ $('#viewBody').innerHTML=facNpsCli(); drawNpsCli(); return; }

/* Facilitação > Resultados: agenda de aplicações, como chegou, % mercado, presencial/ciclo */
function facResultadosAgenda(){
  let a=A.base().filter(x=>x.tipoE==='Aplicação');
  // "Próximas turmas" = a partir do dia seguinte à última data do recorte filtrado.
  const corte=state.filters['DataFim'] || (a.length?a.map(x=>x.d).filter(Boolean).sort().slice(-1)[0]:null) || D.META.hoje;
  const todasAplic=AG.filter(x=>x.tipoE==='Aplicação'&&x.st!=='Cancelado');
  const futuras=todasAplic.filter(x=>x.d&&x.d>corte).sort((p,q)=>(p.d||'').localeCompare(q.d||''));
  const proxSub=futuras.length?'após '+fmtBRfull(corte):'a partir de hoje';
  return `<div class="grid g4">
     ${kpi({tint:'coral',icon:'bar',label:'Aplicações no recorte',val:a.length,sub:'turmas de aplicação',open:'kpiAplic()'})}
     ${kpi({tint:'rosa',icon:'users',label:'Próximas turmas',val:futuras.length,sub:proxSub,open:'kpiProximas()'})}
     ${kpi({tint:'gold',icon:'grid',label:'Ao vivo',val:a.filter(x=>x.mod!=='Presencial').length,open:'kpiAoVivo()'})}
     ${kpi({tint:'info',icon:'book',label:'Presenciais',val:a.filter(x=>x.mod==='Presencial').length,open:'kpiPresencial()'})}
   </div>
   <div class="grid g2 mt16">
     ${card('Como chegou ao treinamento','Origem das turmas · clique para filtrar',rankList(tally(a,x=>x.chegou||null,8),'chegou',true))}
     ${card('% por Mercado','Participação de cada bioma no recorte','<div class="chart-box"><canvas id="chMercado"></canvas></div>','chMercado')}
   </div>
   <div class="grid g2 mt16">
     ${card('Presenciais por Ciclo','Volume de turmas presenciais ao longo dos ciclos','<div class="chart-box"><canvas id="chPresCiclo"></canvas></div>','chPresCiclo')}
     ${card('Modalidade','Ao vivo × presencial',donutBlock('chModRes',A.modalidade(a),'Modalidade'))}
   </div>
   ${cardMt('Próximas aplicações','Turmas de aplicação programadas (sem alocação de facilitador)',
     aplFiltroBar()+`<div class="apl-scroll">${agendaAplicacoes(aplFiltradas(futuras.length?futuras:a))}</div>`)}`;
}
let aplRange={ini:'',fim:''};
function aplFiltroBar(){
  return `<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
     <div class="filter"><label>De</label><input type="date" value="${aplRange.ini}" onchange="aplRange.ini=this.value;render()"></div>
     <div class="filter"><label>Até</label><input type="date" value="${aplRange.fim}" onchange="aplRange.fim=this.value;render()"></div>
     ${aplRange.ini||aplRange.fim?`<button class="pill" onclick="aplRange={ini:'',fim:''};render()">limpar datas</button>`:''}</div>`;
}
function aplFiltradas(lista){
  let l=lista;
  if(aplRange.ini)l=l.filter(x=>x.d&&x.d>=aplRange.ini);
  if(aplRange.fim)l=l.filter(x=>x.d&&x.d<=aplRange.fim);
  return l;
}
function agendaAplicacoes(lista){
  const ord=lista.slice().sort((a,b)=>(a.d||'').localeCompare(b.d||''));
  if(!ord.length)return '<div style="color:var(--text-muted);padding:14px">Sem aplicações no recorte.</div>';
  return `<table class="agenda"><thead><tr>
     <th>Data</th><th>Treinamento</th><th>Ciclo</th><th>Modalidade</th><th>Público</th><th>Status</th></tr></thead><tbody>
     ${ord.map(x=>`<tr><td class="t-id">${fmtBRfull(x.d)}${x.h?' · '+x.h:''}</td><td>${x.tr}</td>
       <td>${x.cic||'—'}</td><td><span class="badge ${x.mod==='Presencial'?'coral':'ok'}">${x.mod}</span></td>
       <td>${x.pub||'—'}</td><td>${x.st}</td></tr>`).join('')}</tbody></table>`;
}
function drawFacResultados(){
  const P=palette();
  let a=A.base().filter(x=>x.tipoE==='Aplicação');
  // % por mercado (bioma)
  const merc=A.biomas(a);const totM=merc.reduce((s,x)=>s+x.turmas,0)||1;
  const em=document.getElementById('chMercado');
  if(em){if(charts['chMercado'])charts['chMercado'].destroy();
    charts['chMercado']=new Chart(em,{type:'bar',
      data:{labels:merc.map(m=>m.nome),datasets:[{data:merc.map(m=>Math.round(m.turmas/totM*100)),
        backgroundColor:merc.map(m=>biomaColor(m.id)),borderRadius:8}]},
      options:Object.assign(baseOpts(),{onClick:(e,el)=>{if(el.length){crossFilter('Bioma',merc[el[0].index].id);}},
        plugins:{legend:{display:false},datalabels:{display:true,anchor:'end',align:'end',color:P.text,font:{weight:'700',size:11},formatter:v=>v+'%'},tooltip:{enabled:true}}})});}

function facEquipeCli(){

  } else {
    // por facilitador: card com nº de especialidades por dimensão
    corpo=`<div class="card"><div class="card-h"><div><h3>Competências por facilitador</h3><p>Clique para o raio-X completo</p></div></div>
      <div class="perfis">${comp.facilitadores.map(f=>{

        return `<div class="perfil-card" onclick="showRaioX('${f.replace(/'/g,'')}')">

/* ---- 2.2 CAPACIDADE PRODUTIVA (Facilitação) ---- */
function capDateField(){return `<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">
   <div class="filter"><label>Data início</label><input type="date" id="capIni" value="${capRange.ini||''}" onchange="capRange.ini=this.value;render()"></div>
   <div class="filter"><label>Data fim</label><input type="date" id="capFim" value="${capRange.fim||''}" onchange="capRange.fim=this.value;render()"></div>
   ${capRange.ini||capRange.fim?`<button class="pill" onclick="capRange={ini:'',fim:''};render()">limpar período</button>`:''}</div>`;}

function capacidadeCalc(){
  let a=AG.filter(x=>x.st!=='Cancelado');
  // default: mês atual (evita diluir no ano todo); usuário pode ampliar pelos campos
  const mesAtual=D.META.hoje.slice(0,7);
  const ini=capRange.ini||(mesAtual+'-01');
  let fim=capRange.fim;
  if(!fim){const y=+mesAtual.slice(0,4),m=+mesAtual.slice(5,7);const ult=new Date(y,m,0).getDate();fim=mesAtual+'-'+String(ult).padStart(2,'0');}
  a=a.filter(x=>x.d&&x.d>=ini&&x.d<=fim);
  // facilitadores ativos = os da matriz (chave curta)
  const ativos=D.competencias.facilitadores.map(f=>D.competencias.chave[f]);
  // dias ÚTEIS do período (seg-sex)
  const dias=[];
  let dcur=new Date(ini+'T00:00');const dend=new Date(fim+'T00:00');let g=0;
  while(dcur<=dend&&g<400){const dow=dcur.getDay();if(dow!==0&&dow!==6)dias.push(dcur.toISOString().slice(0,10));dcur.setDate(dcur.getDate()+1);g++;}
  // capacidade: por facilitador por dia = 3 se online; se tem presencial no dia, 0 nesse dia
  let capMax=0;
  const porFacDia={};
  a.forEach(x=>{const f=x.f;if(!f||f==='Sem informação')return;const k=f+'|'+x.d;
    if(!porFacDia[k])porFacDia[k]={pres:false};
    if(x.mod==='Presencial')porFacDia[k].pres=true;});
  // capacidade máxima = soma por facilitador ativo, por dia do período: 3 se não-presencial naquele dia
  ativos.forEach(f=>{dias.forEach(d=>{const k=f+'|'+d;const tem=porFacDia[k];
    if(tem&&tem.pres)capMax+=0; else capMax+=3;});});
  const agendadas=a.filter(x=>['Aprovado','Realizado'].includes(x.st)).length;
  const horas=Math.round(a.reduce((s,x)=>s+(x.ch||0),0));
  const capComFolga=Math.round(capMax*0.85); // margem de backup 15%
  const vagas=Math.max(0,capComFolga-agendadas);
  return {ativos:ativos.length,dias:dias.length,capMax,capComFolga,agendadas,horas,vagas,
    ocup:capComFolga?Math.round(agendadas/capComFolga*100):0};
}
function facCapacidadeCli(){
  const c=capacidadeCalc();
  return capDateField()+`
   <div class="grid g4">
    ${kpi({tint:'coral',icon:'book',label:'Horas entregues',val:c.horas+'h',sub:'soma da carga horária'})}
    ${kpi({tint:'rosa',icon:'grid',label:'Capacidade máxima',val:c.capComFolga,sub:`${c.capMax} bruta · −15% backup`})}
    ${kpi({tint:'gold',icon:'bar',label:'Turmas agendadas',val:c.agendadas})}
    ${kpi({tint:c.vagas>0?'info':'coral',icon:'users',label:'Vagas restantes',val:c.vagas,sub:c.vagas>0?'ainda há folga':'no limite'})}
   </div>
   <div class="card mt16"><div class="card-h"><div><h3>Ocupação da capacidade</h3>
     <p>${c.ativos} facilitadores · ${c.dias} dias no período · regra: 3 turmas/dia online, 0 em dia presencial</p></div>
     <span class="badge ${c.ocup>85?'coral':c.ocup>60?'warn':'ok'}">${c.ocup}% ocupado</span></div>
     <div class="chart-box"><canvas id="chCapac"></canvas></div></div>
   <div class="card mt16" style="background:var(--bg-soft)"><div style="padding:4px">
     <p style="font-size:12.5px;color:var(--text-muted);line-height:1.5">💡 <b>Como lemos:</b> a capacidade máxima considera cada facilitador ativo entregando até 3 turmas online por dia. Em dias com turma presencial, aquele facilitador não entra na conta de turmas online (deslocamento). Aplicamos 15% de margem de backup como segurança operacional.</p></div></div>`;
}
function drawCapacidadeCli(){
  const P=palette();const c=capacidadeCalc();
  const el=document.getElementById('chCapac');if(!el)return;
  if(charts['chCapac'])charts['chCapac'].destroy();
  charts['chCapac']=new Chart(el,{type:'bar',

function wordcloud(){
  // dinâmica: gera a partir dos comentários filtrados
  const coms=vozComentariosFiltrados();
  const stop=new Set('de da do das dos e o a os as um uma que com para por em no na nos nas se ao foi muito mais meu minha sua seu nao não tudo todos toda bem ja já sobre como mas ou pra muito sempre esse essa isso aqui sem ser tem mesmo'.split(' '));
  const freq={};
  coms.forEach(c=>{(c.txt.toLowerCase().match(/[a-zà-ú]{4,}/g)||[]).forEach(w=>{if(!stop.has(w))freq[w]=(freq[w]||0)+1;});});
  let arr=Object.entries(freq).map(([w,n])=>({w,n})).sort((a,b)=>b.n-a.n).slice(0,35);
  if(!arr.length) arr=(D.nuvem||[]).slice(0,35).map(x=>({w:x.w,n:x.n}));
  if(!arr.length) return '<span style="color:var(--text-muted)">Sem dados.</span>';
  const max=Math.max(...arr.map(w=>w.n));
  return arr.map(w=>{const sz=13+w.n/max*18;const op=.5+w.n/max*.5;
    return `<span style="font-size:${sz}px;opacity:${op}">${w.w}</span>`;}).join(' ');
}

/* ============================================================
   MOTOR DE ESTEIRA — capacidade por pessoa (Parte 1)
   ============================================================ */
let TETO_PROJETOS=4; // teto de projetos simultâneos por designer (calibrável com Karina/Marina)
let prioAviso='';
const PERFIS_PRODUCAO=['DA','DG'];
function ehProducao(perfil){return PERFIS_PRODUCAO.includes((perfil||'').toUpperCase());}
function splitResps(resp){return (resp||'').split(/,| e /i).map(s=>s.trim()).filter(s=>s&&s!=='N/A'&&s.length>2);}
function addDias(iso,n){if(!n)return iso;const d=new Date(iso+'T00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

// projetos simultâneos por designer (etapas de produção em aberto), respeitando travas
let projetosTravados=new Set(); // projetos pausados pelo cliente
let prioOrder=null;
function capacidadePessoas(){
  const HOJE=D.META.hoje;
  const ativos=D.projetos.filter(p=>p.prog<100&&!projetosTravados.has(p.nome));
  // descobre designers reais (quem aparece em DA/DG)
  const designers={};
  D.projetos.forEach(p=>(p.etapas||[]).forEach(e=>{
    if(ehProducao(e.perfil))splitResps(e.resp).forEach(r=>{designers[r]=designers[r]||{nome:r,perfil:(e.perfil||'').toUpperCase(),projetos:new Set()};});
  }));
  // conta projetos com etapa de produção aberta
  ativos.forEach(p=>{
    (p.etapas||[]).forEach(e=>{
      if(!ehProducao(e.perfil)||e.st==='ok'||(e.fim&&e.fim<HOJE))return;
      splitResps(e.resp).forEach(r=>{if(designers[r])designers[r].projetos.add(p.nome);});
    });
  });
  return Object.values(designers).map(d=>{
    const n=d.projetos.size;
    const status=n>=TETO_PROJETOS?'lotado':n>=TETO_PROJETOS-1?'limite':'livre';

/* SUBIR PRIORIDADE com check de capacidade */
function prioSubir(i){
  if(i===0)return;
  const nome=prioOrder[i];
  const proj=D.projetos.find(p=>p.nome===nome);
  // checa se a pessoa do projeto está lotada
  const pessoas=capacidadePessoas();
  const pessoasProj=[...new Set((proj.etapas||[]).filter(e=>ehProducao(e.perfil)).flatMap(e=>splitResps(e.resp)))];
  const lotada=pessoasProj.find(nm=>{const c=pessoas.find(x=>x.nome===nm);return c&&c.status==='lotado';});
  if(lotada)prioAviso=`⚠️ <b>Atenção ao subir "${proj.nome}":</b> ${lotada} está lotada (${pessoas.find(x=>x.nome===lotada).n} projetos). Priorizar este projeto pode atrasar os outros dela — ou considere realocar.`;
  else prioAviso='';
  const t=prioOrder[i];prioOrder[i]=prioOrder[i-1];prioOrder[i-1]=t;render();
}
function prioMove(i,dir){
  const j=i+dir;if(j<0||j>=prioOrder.length)return;
  const t=prioOrder[i];prioOrder[i]=prioOrder[j];prioOrder[j]=t;render();
}
function initPrioDrag(){
  const list=document.getElementById('prioList');if(!list)return;
  let dragEl=null;
  list.querySelectorAll('.prio-card').forEach(card=>{
    card.addEventListener('dragstart',()=>{dragEl=card;card.style.opacity='.4';});
    card.addEventListener('dragend',()=>{card.style.opacity='';});
    card.addEventListener('dragover',e=>{e.preventDefault();
      const after=getDragAfter(list,e.clientY);
      if(after==null)list.appendChild(dragEl);else list.insertBefore(dragEl,after);});
  });
  list.addEventListener('drop',()=>{
    prioOrder=[...list.querySelectorAll('.prio-card')].map(c=>c.dataset.nome);
    // recupera nome real (sem escape de aspas)
    prioOrder=prioOrder.map(nm=>{const p=D.projetos.find(x=>x.nome.replace(/"/g,'')===nm);return p?p.nome:nm;});
    render();
  });
}
function getDragAfter(list,y){
  const els=[...list.querySelectorAll('.prio-card:not([style*="opacity: 0.4"])')];
  return els.reduce((closest,child)=>{const box=child.getBoundingClientRect();const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset)return{offset,element:child};return closest;},{offset:-Infinity}).element;
}

/* Capacidade Produtiva — DA/DG, máx 2 tarefas/dia por pessoa */
function aprCapacidadeCalc(){
  const tarefas=D.tarefasDesign;
  // expande cada tarefa pelos dias (ini..fim) por responsável
  const carga={}; // resp -> {dia: count}
  const tipoDe={};
  tarefas.forEach(t=>{
    // pode ter múltiplos responsáveis separados por "e"/","
    const resps=t.resp.split(/,| e /).map(s=>s.trim()).filter(Boolean);
    resps.forEach(r=>{
      tipoDe[r]=t.tipo;
      let d=new Date(t.ini+'T00:00');const fim=new Date(t.fim+'T00:00');
      let guard=0;
      while(d<=fim&&guard<120){
        const dow=d.getDay();
        if(dow!==0&&dow!==6){const k=d.toISOString().slice(0,10);
          carga[r]=carga[r]||{};carga[r][k]=(carga[r][k]||0)+1;}
        d.setDate(d.getDate()+1);guard++;
      }
    });
  });
  // utilização por pessoa: média de tarefas/dia ativo vs limite 2
  const LIM=2;
  const designersValidos=['ISABELLA','JESSICA','MEIR','RENATA','LEONARDO'];
  const pessoas=Object.keys(carga).filter(r=>designersValidos.some(d=>r.toUpperCase().includes(d))).map(r=>{
    const dias=Object.values(carga[r]);
    const diasAtivos=dias.length;
    const totalTarefasDia=dias.reduce((s,n)=>s+n,0);
    const sobre=dias.filter(n=>n>LIM).length; // dias acima do limite
    const mediaDia=diasAtivos?(totalTarefasDia/diasAtivos):0;
    const util=Math.round(mediaDia/LIM*100);
    return {nome:r,tipo:tipoDe[r],diasAtivos,sobre,util:Math.min(util,200),mediaDia:mediaDia.toFixed(1)};
  }).sort((a,b)=>b.util-a.util);
  return {pessoas,LIM};
}
function aprCapacidade(){
  const c=aprCapacidadeCalc();
  const sobrecarga=c.pessoas.filter(p=>p.sobre>0).length;
  const mediaUtil=c.pessoas.length?Math.round(c.pessoas.reduce((s,p)=>s+p.util,0)/c.pessoas.length):0;
  return `<div class="grid g4">
    ${kpi({tint:'coral',icon:'users',label:'Designers',val:c.pessoas.length,sub:'DA + DG'})}
    ${kpi({tint:'rosa',icon:'bar',label:'Utilização média',val:mediaUtil+'%',sub:'do limite de 2/dia'})}
    ${kpi({tint:sobrecarga?'coral':'gold',icon:'grid',label:'Com sobrecarga',val:sobrecarga,sub:'dias acima de 2 tarefas'})}

   </div>
   <div class="card mt16"><div class="card-h"><div><h3>Utilização por designer</h3>
     <p>Tarefas ativas vs. limite de ${c.LIM}/dia · barra cheia = 100% do limite</p></div></div>
     <div class="chart-box"><canvas id="chAprCap"></canvas></div></div>
   <div class="card mt16" style="background:var(--bg-soft)"><div style="padding:4px">
     <p style="font-size:12.5px;color:var(--text-muted);line-height:1.5">💡 <b>Como lemos:</b> cada Designer de Aprendizagem (DA) ou Gráfico (DG) tem capacidade saudável de até ${c.LIM} tarefas simultâneas por dia. Acima disso indica risco de gargalo. Cálculo a partir das tarefas do cronograma (dias úteis).</p></div></div>`;
}

let arvoreFiltro='tudo';
function viewArvore(){
  const P=D.arvore.pessoas;const time=D.arvore.time;
  const ac=nm=>{const c=['#E85828','#B85838','#E89DA8','#D4A574','#8B7AB8','#7A9B6E','#A07254'];return c[nm.charCodeAt(0)%c.length];};
  const cp=(p,tag)=>`<div class="org-card${tag?' '+tag:''}"><div class="av" style="background:${ac(p.nome)}">${p.nome[0]}</div>
    <div class="oi"><b>${p.nome}</b><span>${p.papel}</span></div></div>`;
  const lvl=(cards)=>`<div class="org-level">${cards}</div>`;
  const fac=time.filter(t=>t.area==='facilitacao');
  const apr=time.filter(t=>t.area==='aprendizagem');
  let org='';
  if(arvoreFiltro==='facilitacao'){
    // Ju → Mauricio → (você + Karina lado a lado) → time facilitação
    org=lvl(cp(P.ju))+lvl(cp(P.mauricio))+lvl(cp(P.karina,'apoio')+cp(P.xavier))+lvl(fac.map(t=>cp(t)).join(''));
  } else if(arvoreFiltro==='aprendizagem'){
    org=lvl(cp(P.ju))+lvl(cp(P.marina))+lvl(cp(P.karina,'apoio')+cp(P.xavier))+lvl(apr.map(t=>cp(t)).join(''));
  } else if(arvoreFiltro==='gestao'){
    // Ju → Karina (braço direito) → Mauricio + Marina → você
    org=lvl(cp(P.ju))+lvl(cp(P.karina))+lvl(cp(P.mauricio)+cp(P.marina))+lvl(cp(P.xavier));
  } else {
    // Tudo (opção 2): Ju → Karina → Mauricio + Marina → você (apoio, acima do time) → time
    org=lvl(cp(P.ju))+lvl(cp(P.karina))+lvl(cp(P.mauricio)+cp(P.marina))
      +lvl(cp(P.xavier,'apoio'))+lvl(time.map(t=>cp(t)).join(''));
  }
  $('#viewBody').innerHTML=`<div style="display:flex;gap:8px;margin-bottom:12px">
      ${[['tudo','Tudo'],['facilitacao','Facilitação'],['aprendizagem','Aprendizagem'],['gestao','Gestão']].map(([f,l])=>`<button class="pill ${arvoreFiltro===f?'active':''}" onclick="arvoreFiltro='${f}';render()">${l}</button>`).join('')}</div>
    ${card('Organograma do Núcleo · Afferolab × Natura','Estrutura da equipe',`<div class="org">${org}</div>`)}`;
}
