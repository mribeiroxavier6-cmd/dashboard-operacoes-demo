let kanbanRange={ini:'',fim:''};
function kanbanBlock(comFiltro){
  const a=A.base();
  let dias;
  if(kanbanRange.ini||kanbanRange.fim){
    // range customizado: até 7 dias úteis a partir do início
    const ini=kanbanRange.ini||semanaDias()[0];
    const fim=kanbanRange.fim||'';
    dias=[];let d=new Date(ini+'T00:00');let g=0;
    while(g<14&&dias.length<7){const iso=d.toISOString().slice(0,10);
      if(fim&&iso>fim)break;
      const dow=d.getDay();if(dow!==0&&dow!==6)dias.push(iso);
      d.setDate(d.getDate()+1);g++;}
  } else dias=semanaDias().slice(0,5);
  const filtro=comFiltro?`<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
     <div class="filter"><label>De</label><input type="date" value="${kanbanRange.ini}" onchange="kanbanRange.ini=this.value;render()"></div>
     <div class="filter"><label>Até</label><input type="date" value="${kanbanRange.fim}" onchange="kanbanRange.fim=this.value;render()"></div>
     ${kanbanRange.ini||kanbanRange.fim?`<button class="pill" onclick="kanbanRange={ini:'',fim:''};render()">semana atual</button>`:''}</div>`:'';
  return filtro+`<div class="kanban">`+dias.map(iso=>{
    const items=a.filter(x=>x.d===iso);const feriado=iso==='2026-06-04';
    const ativas=items.filter(x=>x.st!=='Cancelado').length;
    return `<div class="kan-col"><div class="kan-head${feriado?' feriado':''}"><b>${fmtBR(iso)}</b><span>${feriado?'Feriado · Corpus Christi':ativas+' turmas'}</span></div>
      ${items.slice(0,6).map(x=>{const canc=x.st==='Cancelado';
        return `<div class="kan-card${canc?' cancelada':''}"><div class="kt">${x.tr}${canc?' <span class="badge coral" style="font-size:9px">CANCELADA</span>':''}</div>
        <div class="kmeta">${x.h?`<span class="tag hora">${x.h}</span>`:''}
        <span class="tag ${x.mod==='Presencial'?'pres':'live'}">${x.mod}</span></div>
        <div class="kf">Facilita: ${x.f}${x.m!=='N/A'?` · Modera: ${x.m}`:''}</div></div>`;}).join('')||'<div style="padding:10px;font-size:11px;color:var(--text-muted)">Sem turmas</div>'}
      </div>`;}).join('')+`</div>`;
}

function showRaioX(nome){
  const comp=D.competencias;let html='<div class="raiox">';
  for(const dim of Object.keys(comp.dimensoes)){const found=[];
    for(const cat of comp.dimensoes[dim]){const cell=comp.matriz[dim]?.[cat]||{};
      if((cell.esp||[]).includes(nome))found.push([cat,'Especialista','ok']);
      else if((cell.inter||[]).includes(nome))found.push([cat,'Intermediário','warn']);
      else if((cell.dev||[]).includes(nome))found.push([cat,'Em desenvolvimento','coral']);}
    if(found.length)html+=`<div class="rx-dim"><h4>${dim}</h4>${found.map(([c,l,b])=>`<div class="rx-row"><span>${c}</span><span class="badge ${b}">${l}</span></div>`).join('')}</div>`;}
  // turmas reais desse facilitador (cruza com agenda)
  const fn=nome.split(' ')[0].toUpperCase();
  const turmas=AG.filter(x=>(x.f||'').toUpperCase().startsWith(fn));
  if(turmas.length)html+=`<div class="rx-dim"><h4>Atividade na agenda</h4><div class="rx-row"><span>Turmas como facilitador</span><span class="badge ok">${turmas.length}</span></div></div>`;
  html+='</div>';
  openModal('Raio-X · '+nome,html||'<p>Sem competências mapeadas.</p>');
}

function maPares(){
  const a=atuacaoBase().filter(x=>x.f&&x.f!=='Sem informação'&&x.m&&x.m!=='N/A');
  const mapa={};
  a.forEach(x=>{const k=x.f+'|||'+x.m;mapa[k]=(mapa[k]||0)+1;});
  const pares=Object.entries(mapa).map(([k,n])=>{const p=k.split('|||');return{f:p[0],m:p[1],n};}).sort((x,y)=>y.n-x.n);
  const unicos=pares.length;const repetidos=pares.filter(p=>p.n>1).length;
  const totalForm=a.length;const diversidade=totalForm?Math.round(unicos/totalForm*100):0;
  const vol={};a.forEach(x=>{vol[x.f]=(vol[x.f]||0)+1;vol[x.m]=(vol[x.m]||0)+1;});
  const topPessoas=Object.entries(vol).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);
  const jaPar=new Set(pares.flatMap(p=>[p.f+'|'+p.m,p.m+'|'+p.f]));
  const potencial=[];
  for(let i=0;i<topPessoas.length;i++)for(let j=i+1;j<topPessoas.length;j++){
    const x=topPessoas[i],y=topPessoas[j];
    if(!jaPar.has(x+'|'+y)) potencial.push({x,y,v:vol[x]+vol[y]});}
  potencial.sort((a,b)=>b.v-a.v);
  return `<div class="grid g4">
     ${kpi({tint:'coral',icon:'users',label:'Pares formados',val:totalForm})}
     ${kpi({tint:'rosa',icon:'grid',label:'Pares únicos',val:unicos})}
     ${kpi({tint:'gold',icon:'bar',label:'Pares repetidos',val:repetidos})}
     ${kpi({tint:'info',icon:'book',label:'Diversidade',val:diversidade+'%',sub:'únicos / total'})}
   </div>
   ${cardMt('Duplas mais frequentes','Pares repetidos em destaque',
     `<div class="rank">`+pares.slice(0,14).map(p=>`<div class="rank-row" style="grid-template-columns:1fr auto">
        <div class="nm" style="white-space:normal">${p.f} <span style="color:var(--text-muted)">+</span> ${p.m} ${p.n>1?'<span class="badge coral" style="margin-left:6px">'+p.n+'×</span>':''}</div>
        <div class="vl">${p.n}</div></div>`).join('')+`</div>`)}
   ${cardMt('Combinações com potencial','Alto volume que nunca atuaram juntos — oportunidade de rotação',
     potencial.length?`<div class="perfis">`+potencial.slice(0,8).map(p=>`<div class="carga-card">
        <div class="cg-av">↔</div><div class="cg-info"><b>${p.x} + ${p.y}</b><span>nunca atuaram juntos · volume ${p.v}</span></div></div>`).join('')+`</div>`
      :'<div style="color:var(--text-muted);padding:14px">Sem sugestões no recorte.</div>')}`;
}

function horaToMin(h){if(!h)return null;const p=h.split(':');return (+p[0])*60+(+p[1]);}
function detectaConflitos(ausencias){
  const a=A.base().filter(x=>x.st!=='Cancelado');const conflitos=[];
  ausencias.forEach(au=>{a.forEach(t=>{
    if(t.d<au.ini||t.d>au.fim) return;
    const ehFac=t.f===au.nome,ehMod=t.m===au.nome;if(!ehFac&&!ehMod) return;
    let sobrepoe=true;
    if(au.per==='Parcial'&&au.hini&&t.h){const ti=horaToMin(t.h),tf=ti+60,ai=horaToMin(au.hini),af=horaToMin(au.hfim);sobrepoe=(ti<af&&tf>ai);}
    if(sobrepoe) conflitos.push({nome:au.nome,d:t.d,turma:t.t,tr:t.tr,papel:ehFac?'Facilitador':'Moderador',tipo:au.tipo,per:au.per});});});
  return conflitos;
}

function maDisponibilidade(){
  const a=A.base().filter(x=>x.st!=='Cancelado');

  let ini=state.filters['DataIni']||datasAg[0]||D.META.hoje;

  for(let i=0;i<14;i++){const dt=new Date(d0);dt.setDate(d0.getDate()+i);dias.push(dt.toISOString().slice(0,10));}
  const pessoas=pessoasAtuantes().slice(0,20);const aus=window.AUSENCIAS;
  function estado(nome,dia){
    const turmas=a.filter(x=>x.d===dia&&(x.f===nome||x.m===nome));
    const au=aus.find(z=>z.nome===nome&&z.ini<=dia&&z.fim>=dia);
    if(au&&turmas.length){
      if(au.per==='Integral') return 'conf';
      const t=turmas[0];if(t.h&&au.hini){const ti=horaToMin(t.h),tf=ti+60,ai=horaToMin(au.hini),af=horaToMin(au.hfim);if(ti<af&&tf>ai)return 'conf';}
      return au.per==='Parcial'?'aus-p':'conf';}
    if(au) return au.per==='Parcial'?'aus-p':'aus-i';

  const head=`<tr><th style="text-align:left">Pessoa</th>`+dias.map(d=>`<th style="text-align:center;font-size:9px">${d.slice(8,10)}/${d.slice(5,7)}</th>`).join('')+`</tr>`;
  const rows=pessoas.map(nome=>`<tr><td class="t-id" style="white-space:nowrap">${nome}</td>`+

     <div class="tbl-wrap"><table class="agenda"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`);
}
function maDesenvolvimento(){

    (repet.length?insight('🔁',`Pares mais repetidos: ${repet.map(([k,n])=>k+' ('+n+'×)').join(' · ')}. Considere rotação.`):'')+
    (facGN.length?insight('👔',`Cobertura GN concentrada em: ${facGN.map(f=>f.nome).join(', ')}.`):'')+
  `</div>`;
  const recs=[['Rotação de pares','Estimule novas duplas entre os repetidos para espalhar conhecimento.'],

// libera o dashboard conforme o papel (equipe vê tudo / cliente só Cliente)
function aplicarPapel(papel, email){
  state.papel = papel || 'cliente';
  const tag=document.getElementById('sbUser'); if(tag) tag.textContent=(email||'').split('@')[0];
  if(state.papel==='cliente'){
    // cliente: só visão Cliente, esconde o switch de modo e força modo cliente
    document.getElementById('modeInterno').style.display='none';
    document.querySelector('.sb-section .sb-section-label').textContent='Acesso';
    setMode('cliente');
  } else {

  }
  document.body.classList.add('logged');

async function doLogin(){
  const email=$('#loginEmail').value.trim();
  const pass=$('#loginPass').value;
  const err=$('#loginErr');
  if(!email||!email.includes('@')){err.textContent='Informe um email válido.';return;}
  if(!pass){err.textContent='Informe a senha.';return;}
  // modo provisório (enquanto Supabase não estiver configurado)
  if(!sbReady){
    if(pass==='natura2026'){ err.textContent=''; aplicarPapel('equipe',email); }
    else err.textContent='Senha incorreta (modo provisório).';
    return;
  }
  // login real Supabase
  err.textContent='Entrando…';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Email ou senha incorretos.';return;}
  // busca o papel na tabela profiles
  let papel='cliente';
  try{
    const {data:prof}=await sb.from('profiles').select('papel').eq('id',data.user.id).single();
    if(prof&&prof.papel) papel=prof.papel;
  }catch(e){}
  err.textContent='';
  aplicarPapel(papel,email);
}
async function doLogout(){
  if(sbReady){try{await sb.auth.signOut();}catch(e){}}
  document.body.classList.remove('logged');
  $('#loginPass').value='';$('#loginErr').textContent='';
}

// Esqueci minha senha — envia email de recuperação
async function doForgot(){
  const email=$('#loginEmail').value.trim();
  const err=$('#loginErr');
  if(!email||!email.includes('@')){err.textContent='Digite seu email acima e clique de novo.';return;}
  if(!sbReady){err.textContent='Recuperação disponível só com login real (Supabase).';return;}
  err.textContent='Enviando…';
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
  if(error){err.textContent='Não foi possível enviar. Verifique o email.';return;}
  err.textContent='';
  err.style.color='var(--success)';
  err.textContent='✓ Email enviado! Verifique sua caixa de entrada.';
  setTimeout(()=>{err.style.color='';},5000);
}

// Se a pessoa voltou do email de recuperação, mostra campo de nova senha
async function checarRecuperacao(){
  if(!sbReady) return;
  const hash=window.location.hash||'';
  if(hash.includes('type=recovery')){
    const nova=prompt('Defina sua nova senha (mínimo 6 caracteres):');
    if(nova&&nova.length>=6){
      const {error}=await sb.auth.updateUser({password:nova});
      if(error) toast('Erro ao trocar senha: '+error.message);
      else { toast('Senha alterada com sucesso! Entre com a nova senha.'); }
    }
    // limpa o hash da URL
    history.replaceState(null,'',window.location.pathname);
  }
}
